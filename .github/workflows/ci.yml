name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))" || exit 1
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))" || exit 1

      - name: ShellCheck (scripts + hooks)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck templates/githooks/post-commit || true
          shellcheck templates/scripts/sprint-lib.sh || true
          shellcheck templates/scripts/sprint-plan.sh || true
          shellcheck templates/scripts/sprint-implement.sh || true
          shellcheck templates/scripts/sprint-gate.sh || true
          shellcheck templates/scripts/sprint-review.sh || true
          shellcheck scripts/docs-refresh.sh || true

      - name: Syntax-check all shell scripts
        run: |
          bash -n templates/githooks/post-commit
          for f in templates/scripts/*.sh scripts/*.sh; do
            echo "Checking $f..."
            bash -n "$f" || exit 1
          done

  json-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json; do
            echo "Linting $f..."
            python3 -m json.tool "$f" > /dev/null || exit 1
          done
